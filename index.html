<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Extractor & Chat Assistant Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; color: #374151; }
        .main-container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-section { text-align: center; margin-bottom: 25px; }
        h2 { color: #1f2937; margin-top: 0; font-size: 28px; }
        
        .upload-area { border: 2px dashed #3b82f6; padding: 25px; border-radius: 8px; background-color: #eff6ff; text-align: center; margin-bottom: 20px; transition: all 0.3s; }
        .upload-area:hover { background-color: #dbeafe; }
        input[type="file"] { font-size: 16px; cursor: pointer; }
        
        #statusAlert { padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; display: none; margin-bottom: 10px; line-height: 1.5; }
        #progressText { text-align: center; font-size: 14px; color: #4b5563; font-weight: bold; margin-bottom: 20px; height: 20px; }
        
        .status-processing { background-color: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .status-success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .status-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .workspace { display: flex; gap: 25px; display: none; align-items: flex-start; }
        .preview-panel { flex: 1; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; position: sticky; top: 20px; }
        .data-panel { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        
        .section-title { font-size: 16px; font-weight: 600; margin-top: 0; margin-bottom: 15px; color: #4b5563; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; }

        #pdfViewer { width: 100%; height: 600px; border: 1px solid #d1d5db; border-radius: 4px; display: none; }
        #imgViewer { width: 100%; max-height: 600px; object-fit: contain; border-radius: 4px; display: none; }

        /* Data Table Style */
        .data-container { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #fff; }
        .data-row { display: grid; grid-template-columns: 1fr 2fr; border-bottom: 1px solid #f1f5f9; }
        .data-row:last-child { border-bottom: none; }
        .data-key { background-color: #f8fafc; padding: 12px 15px; font-weight: 600; color: #475569; border-right: 1px solid #f1f5f9; }
        .data-value { padding: 12px 15px; color: #0f172a; word-break: break-word; }
        
        .action-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-download { background-color: #10b981; color: white; }
        .btn-download:hover { background-color: #059669; transform: translateY(-1px); }

        /* Q&A Chat Section Style */
        .qna-container { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .chat-display { height: 250px; overflow-y: auto; padding: 15px; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 8px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg-user { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .msg-ai { background: #e2e8f0; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 0; }
        .chat-input-area { display: flex; border-top: 1px solid #e2e8f0; padding: 10px; background: #fff; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-size: 14px; }
        .chat-input-area input:focus { border-color: #3b82f6; }
        .btn-ask { background-color: #3b82f6; color: white; margin-left: 10px; }
        .btn-ask:hover { background-color: #2563eb; }

        @media (max-width: 900px) { .workspace { flex-direction: column; } .preview-panel, .data-panel { width: 100%; position: static; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h2>⚡ AI Document Assistant & Extractor</h2>
        <p style="color: #6b7280; font-size: 15px;">Extract dynamic headers and Ask AI any question about the document.</p>
    </div>

    <div class="upload-area">
        <input type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg">
    </div>

    <div id="statusAlert"></div>
    <div id="progressText"></div>

    <div class="workspace" id="workspaceArea">
        <div class="preview-panel">
            <h3 class="section-title">📄 Document Preview</h3>
            <iframe id="pdfViewer" title="PDF Preview"></iframe>
            <img id="imgViewer" alt="Image Preview">
        </div>

        <div class="data-panel">
            
            <div>
                <div class="action-header">
                    <h3 class="section-title" id="successHeader" style="margin: 0; border: none;">📊 Extracted Data</h3>
                    <button id="downloadBtn" class="btn btn-download" onclick="downloadCSV()">📥 Download Excel</button>
                </div>
                <div class="data-container" id="dashboardArea"></div>
            </div>

            <div class="qna-container">
                <h3 class="section-title" style="margin: 0; padding: 15px; background: #fff; border-bottom: 1px solid #e2e8f0;">💬 Ask AI about this document</h3>
                <div class="chat-display" id="chatDisplay">
                    <div class="msg msg-ai">Hello! I have read the document. What would you like to know?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="E.g., What is the lorry number?" onkeypress="handleEnter(event)">
                    <button class="btn btn-ask" onclick="askQuestion()">Send</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // 🔑 API KEYS
    const GEMINI_API_KEY = "AIzaSyDKkj8OVteCRmNpBa6buqacgdaiYYTKpJo";
    const GROQ_API_KEY = "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";
    const OPENROUTER_API_KEY = "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";

    let globalExtractedData = [];
    let masterHeaders = new Set(["File Name"]);
    let currentObjectUrl = null;
    let savedDocumentText = ""; // 🧠 Memory for Q&A

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const statusAlert = document.getElementById('statusAlert');
        const progressText = document.getElementById('progressText');
        const workspaceArea = document.getElementById('workspaceArea');
        const dashboard = document.getElementById('dashboardArea');
        const chatDisplay = document.getElementById('chatDisplay');
        
        workspaceArea.style.display = 'none';
        dashboard.innerHTML = '';
        progressText.innerText = '';
        globalExtractedData = [];
        masterHeaders = new Set(["File Name"]);
        savedDocumentText = ""; // Reset memory
        chatDisplay.innerHTML = '<div class="msg msg-ai">Hello! I have read the document. What would you like to know?</div>'; // Reset chat

        statusAlert.style.display = 'block';
        statusAlert.className = 'status-processing';
        
        // Setup Viewer
        if (currentObjectUrl) { URL.revokeObjectURL(currentObjectUrl); }
        currentObjectUrl = URL.createObjectURL(file);

        if (file.type === "application/pdf") {
            document.getElementById('pdfViewer').src = currentObjectUrl + "#toolbar=0";
            document.getElementById('pdfViewer').style.display = 'block';
            document.getElementById('imgViewer').style.display = 'none';
        } else {
            document.getElementById('imgViewer').src = currentObjectUrl;
            document.getElementById('imgViewer').style.display = 'block';
            document.getElementById('pdfViewer').style.display = 'none';
        }

        try {
            // STEP 1: Conversion
            let imageSrc = (file.type === "application/pdf") ? await convertPdfToImage(file) : currentObjectUrl;

            // STEP 2: LOCAL OCR
            statusAlert.innerHTML = '🔍 Extracting Text via Local OCR...';
            const rawText = await runLocalOCR(imageSrc, progressText);
            
            if (!rawText || rawText.trim().length < 5) throw new Error("Could not extract any text. Image might be blank.");
            progressText.innerText = ''; 
            
            // Save safe text in global memory for Q&A feature later
            savedDocumentText = rawText.substring(0, 6000); 

            // STEP 3: TRIPLE-ENGINE AI FAILOVER (JSON Extraction)
            let extractedJSON;
            statusAlert.innerHTML = '🤖 Structuring Data (Attempt 1: Gemini)...';
            
            try {
                extractedJSON = await callAIEngine(savedDocumentText, "JSON", "GEMINI");
                document.getElementById('successHeader').innerHTML = '📊 Extracted Data (via Gemini)';
            } catch (err1) {
                try {
                    statusAlert.innerHTML = '⚠️ Gemini Failed. Switching to Groq...';
                    extractedJSON = await callAIEngine(savedDocumentText, "JSON", "GROQ");
                    document.getElementById('successHeader').innerHTML = '📊 Extracted Data (via Groq)';
                } catch (err2) {
                    try {
                        statusAlert.innerHTML = '⚠️ Groq Failed. Switching to OpenRouter...';
                        extractedJSON = await callAIEngine(savedDocumentText, "JSON", "OPENROUTER");
                        document.getElementById('successHeader').innerHTML = '📊 Extracted Data (via OpenRouter)';
                    } catch (err3) {
                        throw new Error(`All AI Engines Failed.`);
                    }
                }
            }

            // Render Results
            processDynamicData(extractedJSON, file.name);
            renderVerticalData();

            statusAlert.className = 'status-success';
            statusAlert.innerHTML = '✅ Extraction & Processing Successful!';
            workspaceArea.style.display = 'flex';

        } catch (error) {
            statusAlert.className = 'status-error';
            statusAlert.innerHTML = '❌ Error: ' + error.message;
            progressText.innerText = '';
        }
    });

    // --- Q&A CHAT FEATURE ---
    function handleEnter(e) {
        if (e.key === 'Enter') askQuestion();
    }

    async function askQuestion() {
        const input = document.getElementById('chatInput');
        const question = input.value.trim();
        if (!question || !savedDocumentText) return;

        const chatDisplay = document.getElementById('chatDisplay');
        
        // Append User Question
        chatDisplay.innerHTML += `<div class="msg msg-user">${question}</div>`;
        input.value = '';
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        const loaderId = 'loader_' + Date.now();
        chatDisplay.innerHTML += `<div class="msg msg-ai" id="${loaderId}"><i>Thinking...</i></div>`;
        chatDisplay.scrollTop = chatDisplay.scrollHeight;

        try {
            // Triple-Engine failover for Q&A answers
            let answer;
            try { answer = await callAIEngine(question, "CHAT", "GEMINI"); } 
            catch (e1) {
                try { answer = await callAIEngine(question, "CHAT", "GROQ"); } 
                catch (e2) {
                    try { answer = await callAIEngine(question, "CHAT", "OPENROUTER"); } 
                    catch (e3) { throw new Error("Network error. AI is unreachable."); }
                }
            }
            document.getElementById(loaderId).innerHTML = answer;
        } catch (error) {
            document.getElementById(loaderId).innerHTML = `<span style="color: red;">Error: ${error.message}</span>`;
        }
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // --- MASTER AI CALLER (Handles both JSON and Q&A Chats) ---
    async function callAIEngine(inputText, mode, engine) {
        let prompt, url, requestBody, headers;

        // Mode specific prompts
        if (mode === "JSON") {
            prompt = `You are a strict data extractor. Use exact labels from the document as JSON keys. Do NOT force standard keys. Exclude empty fields. Return STRICTLY as a flat JSON object. RAW TEXT:\n${inputText}`;
        } else if (mode === "CHAT") {
            prompt = `You are a helpful assistant. Answer the user's question based strictly on the document text provided below. Keep it concise. \n\nDOCUMENT TEXT:\n${savedDocumentText}\n\nUSER QUESTION:\n${inputText}`;
        }

        // Engine specific routing
        if (engine === "GEMINI") {
            url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            headers = { 'Content-Type': 'application/json' };
            requestBody = { contents: [{ parts: [{ text: prompt }] }] };
        } else if (engine === "GROQ") {
            url = "https://api.groq.com/openai/v1/chat/completions";
            headers = { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' };
            requestBody = { model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }], temperature: 0.2 };
        } else if (engine === "OPENROUTER") {
            url = "https://openrouter.ai/api/v1/chat/completions";
            headers = { 'Authorization': `Bearer ${OPENROUTER_API_KEY}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://github.com' };
            requestBody = { model: "google/gemini-2.5-flash", messages: [{ role: "user", content: prompt }], temperature: 0.2 };
        }

        const response = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(requestBody) });
        if (!response.ok) throw new Error(`${engine} API Rejected.`);
        
        const data = await response.json();
        
        // Extract content
        let content = "";
        if (engine === "GEMINI") content = data.candidates[0].content.parts[0].text;
        else content = data.choices[0].message.content;

        // If JSON mode, clean it
        if (mode === "JSON") {
            let clean = content.replace(/```json/g, "").replace(/```/g, "").trim();
            return JSON.parse(clean);
        } else {
            return content; // Plain text answer for chat
        }
    }

    // --- UTILS & OCR ---
    async function convertPdfToImage(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        return canvas.toDataURL('image/png');
    }

    async function runLocalOCR(imageSource, progressElement) {
        const worker = await Tesseract.createWorker({
            logger: m => { if(m.status === 'recognizing text') progressElement.innerText = `OCR Progress: ${Math.round(m.progress * 100)}%`; }
        });
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        const { data: { text } } = await worker.recognize(imageSource);
        await worker.terminate();
        return text;
    }

    // --- DATA RENDERING & EXPORT ---
    function processDynamicData(jsonData, fileName) {
        let rowObj = { "File Name": fileName };
        for (const [key, value] of Object.entries(jsonData)) {
            if(value && value.toString().toLowerCase() !== "n/a" && value.toString().toLowerCase() !== "null") {
                masterHeaders.add(key.trim());
                rowObj[key.trim()] = value;
            }
        }
        globalExtractedData = [rowObj]; 
    }

    function renderVerticalData() {
        const dashboard = document.getElementById('dashboardArea');
        const dataObj = globalExtractedData[0];
        let htmlContent = '';
        masterHeaders.forEach(key => {
            let val = dataObj[key];
            if (val !== undefined) htmlContent += `<div class="data-row"><div class="data-key">${key}</div><div class="data-value">${val}</div></div>`;
        });
        if(htmlContent === '') htmlContent = '<div style="padding: 20px; text-align: center; color: #6b7280;">No data found.</div>';
        dashboard.innerHTML = htmlContent;
    }

    function downloadCSV() {
        if (globalExtractedData.length === 0) return;
        const headersArray = Array.from(masterHeaders);
        let csvContent = "\uFEFF"; 
        csvContent += headersArray.map(h => `"${h.replace(/"/g, '""')}"`).join(",") + "\n";
        globalExtractedData.forEach(row => {
            let rowData = headersArray.map(header => {
                let cellData = row[header] ? row[header] : "";
                return `"${cellData.toString().replace(/"/g, '""')}"`;
            });
            csvContent += rowData.join(",") + "\n";
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "Dynamic_Data_Extract.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
