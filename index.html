<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Extractor: Tesseract + Groq AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7fb; padding: 20px; }
        .main-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .upload-area { border: 2px dashed #3b82f6; padding: 30px; text-align: center; background-color: #eff6ff; border-radius: 10px; margin-bottom: 20px; }
        #statusAlert { padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; margin-bottom: 20px; }
        .status-processing { background-color: #e0f2fe; color: #0284c7; }
        .status-success { background-color: #d1fae5; color: #065f46; }
        .status-error { background-color: #fee2e2; color: #991b1b; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background-color: #1e293b; color: white; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="text-align: center;">⚡ Hybrid Engine: Tesseract OCR + Groq AI</h2>
    <p style="text-align: center; color: #64748b;">Unlimited free local OCR, powered by AI JSON structuring.</p>

    <div class="upload-area">
        <input type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg">
    </div>

    <div id="statusAlert"></div>
    <div id="progressText" style="text-align: center; font-size: 14px; color: #666; margin-bottom: 20px;"></div>

    <div id="dashboardArea"></div>
</div>

<script>
    // Set PDF.js Worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // GROQ API KEY (Sabse fast aur generous free text API)
    const GROQ_API_KEY = "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";

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const statusAlert = document.getElementById('statusAlert');
        const progressText = document.getElementById('progressText');
        const dashboard = document.getElementById('dashboardArea');

        statusAlert.style.display = 'block';
        statusAlert.className = 'status-processing';
        dashboard.innerHTML = '';

        try {
            let imageSrc;
            
            // 1. Check if PDF or Image
            if (file.type === "application/pdf") {
                statusAlert.innerHTML = '📄 Step 1: Converting PDF to Image...';
                imageSrc = await convertPdfToImage(file);
            } else {
                imageSrc = URL.createObjectURL(file);
            }

            // 2. Run Local Tesseract OCR (Free, Unlimited, Runs in Browser CPU)
            statusAlert.innerHTML = '🔍 Step 2: Running Local OCR (Extracting Text)...';
            const rawText = await runLocalOCR(imageSrc, progressText);
            
            if (!rawText || rawText.length < 10) throw new Error("Could not read text from document.");

            // 3. Send ONLY TEXT to Groq AI to structure it (Super fast, no data limits)
            statusAlert.innerHTML = '🤖 Step 3: Structuring Data with Groq Llama 3 API...';
            progressText.innerText = ''; // Clear progress
            
            const extractedJSON = await structureTextWithGroq(rawText);

            // 4. Render Table
            renderTable(extractedJSON, dashboard);

            statusAlert.className = 'status-success';
            statusAlert.innerHTML = '✅ Extraction Successful!';

        } catch (error) {
            statusAlert.className = 'status-error';
            statusAlert.innerHTML = '❌ Error: ' + error.message;
            console.error(error);
        }
    });

    // --- Convert PDF to Image ---
    async function convertPdfToImage(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        return canvas.toDataURL('image/png');
    }

    // --- Run Local Offline OCR (Tesseract) ---
    async function runLocalOCR(imageSource, progressElement) {
        const worker = await Tesseract.createWorker({
            logger: m => {
                if(m.status === 'recognizing text'){
                    progressElement.innerText = `OCR Progress: ${Math.round(m.progress * 100)}%`;
                }
            }
        });
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        const { data: { text } } = await worker.recognize(imageSource);
        await worker.terminate();
        return text;
    }

    // --- Structure Raw Text using Groq Text API (Very Fast) ---
    async function structureTextWithGroq(rawText) {
        const url = "https://api.groq.com/openai/v1/chat/completions";
        
        const prompt = `
            You are a Data Extractor. I have raw text extracted from an invoice using OCR. 
            Extract all key details (Invoice No, Date, GSTIN, Total Amount, Buyer Name, etc.).
            Return STRICTLY as a flat JSON object. No markdown.
            
            RAW TEXT:
            ${rawText}
        `;

        const requestBody = {
            model: "llama3-8b-8192", // Fast text model
            messages: [{ role: "user", content: prompt }],
            temperature: 0.1
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });

        if (!response.ok) throw new Error("Groq API rejected the text processing request.");
        
        const data = await response.json();
        let cleanText = data.choices[0].message.content.replace(/```json/g, "").replace(/```/g, "").trim();
        return JSON.parse(cleanText);
    }

    // --- Render Table ---
    function renderTable(jsonData, container) {
        let html = '<table><thead><tr><th>Field</th><th>Extracted Value</th></tr></thead><tbody>';
        for (const [key, value] of Object.entries(jsonData)) {
            html += `<tr><td><strong>${key}</strong></td><td>${value || '-'}</td></tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }
</script>

</body>
</html>
