<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Extractor Pro (Triple-Hybrid Engine)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; color: #374151; }
        .main-container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-section { text-align: center; margin-bottom: 25px; }
        h2 { color: #1f2937; margin-top: 0; font-size: 28px; }
        
        .upload-area { border: 2px dashed #3b82f6; padding: 25px; border-radius: 8px; background-color: #eff6ff; text-align: center; margin-bottom: 20px; transition: all 0.3s; }
        .upload-area:hover { background-color: #dbeafe; }
        input[type="file"] { font-size: 16px; cursor: pointer; }
        
        #statusAlert { padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; display: none; margin-bottom: 10px; line-height: 1.5; }
        #progressText { text-align: center; font-size: 14px; color: #4b5563; font-weight: bold; margin-bottom: 20px; height: 20px; }
        
        .status-processing { background-color: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .status-success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .status-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .workspace { display: flex; gap: 25px; display: none; align-items: flex-start; }
        .preview-panel { flex: 1; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; }
        .data-panel { flex: 1.2; display: flex; flex-direction: column; }
        
        .section-title { font-size: 16px; font-weight: 600; margin-top: 0; margin-bottom: 15px; color: #4b5563; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; }

        #pdfViewer { width: 100%; height: 600px; border: 1px solid #d1d5db; border-radius: 4px; display: none; }
        #imgViewer { width: 100%; max-height: 600px; object-fit: contain; border-radius: 4px; display: none; }

        .data-container { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #fff; }
        .data-row { display: grid; grid-template-columns: 1fr 2fr; border-bottom: 1px solid #f1f5f9; }
        .data-row:last-child { border-bottom: none; }
        .data-key { background-color: #f8fafc; padding: 12px 15px; font-weight: 600; color: #475569; border-right: 1px solid #f1f5f9; }
        .data-value { padding: 12px 15px; color: #0f172a; word-break: break-word; }
        
        .action-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-download { background-color: #10b981; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-download:hover { background-color: #059669; transform: translateY(-1px); }

        @media (max-width: 900px) { .workspace { flex-direction: column; } .preview-panel, .data-panel { width: 100%; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h2>⚡ Triple-Hybrid AI Extractor</h2>
        <p style="color: #6b7280; font-size: 15px;">100% Dynamic Headers. Local OCR + AI Failover.</p>
    </div>

    <div class="upload-area">
        <input type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg">
    </div>

    <div id="statusAlert"></div>
    <div id="progressText"></div>

    <div class="workspace" id="workspaceArea">
        <div class="preview-panel">
            <h3 class="section-title">📄 Document Preview</h3>
            <iframe id="pdfViewer" title="PDF Preview"></iframe>
            <img id="imgViewer" alt="Image Preview">
        </div>

        <div class="data-panel">
            <div class="action-header">
                <h3 class="section-title" id="successHeader" style="margin: 0; border: none;">📊 Extracted Data</h3>
                <button id="downloadBtn" class="btn-download" onclick="downloadCSV()">📥 Download Excel (CSV)</button>
            </div>
            <div class="data-container" id="dashboardArea"></div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // 🔑 API KEYS
    const GEMINI_API_KEY = "AIzaSyDKkj8OVteCRmNpBa6buqacgdaiYYTKpJo";
    const GROQ_API_KEY = "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";
    const OPENROUTER_API_KEY = "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";

    let globalExtractedData = [];
    let masterHeaders = new Set(["File Name"]);
    let currentObjectUrl = null;

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const statusAlert = document.getElementById('statusAlert');
        const progressText = document.getElementById('progressText');
        const workspaceArea = document.getElementById('workspaceArea');
        const dashboard = document.getElementById('dashboardArea');
        
        workspaceArea.style.display = 'none';
        dashboard.innerHTML = '';
        progressText.innerText = '';
        globalExtractedData = [];
        // Reset headers for every new file so old headers don't stick around
        masterHeaders = new Set(["File Name"]);

        statusAlert.style.display = 'block';
        statusAlert.className = 'status-processing';
        
        // Setup Viewer
        if (currentObjectUrl) { URL.revokeObjectURL(currentObjectUrl); }
        currentObjectUrl = URL.createObjectURL(file);

        if (file.type === "application/pdf") {
            document.getElementById('pdfViewer').src = currentObjectUrl + "#toolbar=0";
            document.getElementById('pdfViewer').style.display = 'block';
            document.getElementById('imgViewer').style.display = 'none';
        } else {
            document.getElementById('imgViewer').src = currentObjectUrl;
            document.getElementById('imgViewer').style.display = 'block';
            document.getElementById('pdfViewer').style.display = 'none';
        }

        try {
            // STEP 1: Image Conversion
            let imageSrc;
            if (file.type === "application/pdf") {
                statusAlert.innerHTML = '📄 Step 1: Converting PDF...';
                imageSrc = await convertPdfToImage(file);
            } else {
                imageSrc = currentObjectUrl;
            }

            // STEP 2: LOCAL OCR
            statusAlert.innerHTML = '🔍 Step 2: Running Free Local OCR...';
            const rawText = await runLocalOCR(imageSrc, progressText);
            
            if (!rawText || rawText.trim().length < 5) throw new Error("Could not extract any text. Image might be blank.");
            progressText.innerText = ''; 
            
            const safeText = rawText.substring(0, 6000); 

            // STEP 3: TRIPLE-ENGINE AI FAILOVER
            let extractedJSON;
            
            try {
                // Engine 1: Gemini
                statusAlert.innerHTML = '🤖 Step 3: Structuring Data...<br>⏳ <b>Attempt 1:</b> Gemini 2.5 API';
                extractedJSON = await callGeminiTextAPI(safeText);
                document.getElementById('successHeader').innerHTML = '📊 Extracted Data (via Gemini)';
            } catch (err1) {
                console.warn("Gemini Failed:", err1);
                try {
                    // Engine 2: Groq
                    statusAlert.innerHTML = '⚠️ Gemini Failed.<br>⏳ <b>Attempt 2:</b> Groq Llama 3 API';
                    extractedJSON = await callGroqTextAPI(safeText);
                    document.getElementById('successHeader').innerHTML = '📊 Extracted Data (via Groq)';
                } catch (err2) {
                    console.warn("Groq Failed:", err2);
                    try {
                        // Engine 3: OpenRouter
                        statusAlert.innerHTML = '⚠️ Groq Failed.<br>⏳ <b>Attempt 3:</b> OpenRouter API';
                        extractedJSON = await callOpenRouterTextAPI(safeText);
                        document.getElementById('successHeader').innerHTML = '📊 Extracted Data (via OpenRouter)';
                    } catch (err3) {
                        throw new Error(`All 3 AI Engines Failed. Final Error: ${err3.message}`);
                    }
                }
            }

            // Render Results
            processDynamicData(extractedJSON, file.name);
            renderVerticalData();

            statusAlert.className = 'status-success';
            statusAlert.innerHTML = '✅ Extraction Successful!';
            workspaceArea.style.display = 'flex';

        } catch (error) {
            statusAlert.className = 'status-error';
            statusAlert.innerHTML = '❌ Error: ' + error.message;
            progressText.innerText = '';
        }
    });

    // --- UTILS & OCR ---
    async function convertPdfToImage(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        return canvas.toDataURL('image/png');
    }

    async function runLocalOCR(imageSource, progressElement) {
        const worker = await Tesseract.createWorker({
            logger: m => { if(m.status === 'recognizing text') progressElement.innerText = `OCR Progress: ${Math.round(m.progress * 100)}%`; }
        });
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        const { data: { text } } = await worker.recognize(imageSource);
        await worker.terminate();
        return text;
    }

    // --- NEW STRICT DYNAMIC PROMPT ---
    const SYSTEM_PROMPT = `You are an expert dynamic Data Extractor AI. Read the raw OCR text below and extract key-value pairs. 
    CRITICAL RULES:
    1. DYNAMIC HEADERS ONLY: Use the exact labels found in the document as your JSON keys.
    2. NO FIXED TEMPLATES: Do NOT force standard keys (like "Invoice No", "Date", "Vendor") if they do not explicitly exist in the text.
    3. NO EMPTY VALUES: If a detail is not in the text, DO NOT create a key for it. Never return "N/A" or "null".
    4. Return STRICTLY as a flat JSON object. No markdown, no text outside the JSON.
    RAW TEXT:\n\n`;

    async function callGeminiTextAPI(text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const response = await fetch(url, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + text }] }] })
        });
        if (!response.ok) throw new Error("Gemini Rejected");
        const data = await response.json();
        return parseCleanJSON(data.candidates[0].content.parts[0].text);
    }

    async function callGroqTextAPI(text) {
        const url = "https://api.groq.com/openai/v1/chat/completions";
        const response = await fetch(url, {
            method: 'POST', headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: SYSTEM_PROMPT + text }], temperature: 0.1 })
        });
        if (!response.ok) throw new Error("Groq Rejected");
        const data = await response.json();
        return parseCleanJSON(data.choices[0].message.content);
    }

    async function callOpenRouterTextAPI(text) {
        const url = "https://openrouter.ai/api/v1/chat/completions";
        const response = await fetch(url, {
            method: 'POST', headers: { 'Authorization': `Bearer ${OPENROUTER_API_KEY}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://github.com' },
            body: JSON.stringify({ model: "google/gemini-2.5-flash", messages: [{ role: "user", content: SYSTEM_PROMPT + text }], temperature: 0.1 })
        });
        if (!response.ok) throw new Error("OpenRouter Rejected");
        const data = await response.json();
        return parseCleanJSON(data.choices[0].message.content);
    }

    function parseCleanJSON(rawString) {
        let clean = rawString.replace(/```json/g, "").replace(/```/g, "").trim();
        return JSON.parse(clean);
    }

    // --- DATA RENDERING & EXPORT ---
    function processDynamicData(jsonData, fileName) {
        let rowObj = { "File Name": fileName };
        for (const [key, value] of Object.entries(jsonData)) {
            // Filter out empty or N/A values just in case AI still hallucinates
            if(value && value.toString().toLowerCase() !== "n/a" && value.toString().toLowerCase() !== "null") {
                masterHeaders.add(key.trim());
                rowObj[key.trim()] = value;
            }
        }
        globalExtractedData = [rowObj]; 
    }

    function renderVerticalData() {
        const dashboard = document.getElementById('dashboardArea');
        const dataObj = globalExtractedData[0];
        let htmlContent = '';
        
        masterHeaders.forEach(key => {
            let val = dataObj[key];
            if (val !== undefined) {
                htmlContent += `<div class="data-row"><div class="data-key">${key}</div><div class="data-value">${val}</div></div>`;
            }
        });
        
        if(htmlContent === '') {
            htmlContent = '<div style="padding: 20px; text-align: center; color: #6b7280;">No clear data found in the document.</div>';
        }
        
        dashboard.innerHTML = htmlContent;
    }

    function downloadCSV() {
        if (globalExtractedData.length === 0) return;
        const headersArray = Array.from(masterHeaders);
        let csvContent = "\uFEFF"; 
        csvContent += headersArray.map(h => `"${h.replace(/"/g, '""')}"`).join(",") + "\n";
        globalExtractedData.forEach(row => {
            let rowData = headersArray.map(header => {
                let cellData = row[header] ? row[header] : "";
                return `"${cellData.toString().replace(/"/g, '""')}"`;
            });
            csvContent += rowData.join(",") + "\n";
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "Dynamic_Data_Extract.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
